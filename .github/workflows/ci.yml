name: CI & Publish

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  # ─── CI: Run on every push & PR ───────────────────────────────────────────
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings 0

      - name: Type check
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

  # ─── Verify Android native module compiles (Kotlin syntax + structure) ───
  android-verify:
    name: Verify Android module
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Android module structure
        run: |
          test -f android/build.gradle
          test -f android/src/main/AndroidManifest.xml
          test -f android/src/main/java/com/pincodeindia/PincodeIndiaModule.kt
          test -f android/src/main/java/com/pincodeindia/PincodeIndiaPackage.kt
          echo "Android native module files present."

  # ─── Verify iOS native module structure (Swift syntax check) ─────────────
  ios-verify:
    name: Verify iOS module
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify iOS module structure
        run: |
          test -f ios/PincodeIndia.swift
          test -f ios/PincodeIndia.m
          test -f pincode-india.podspec
          echo "iOS native module files present."

      - name: Swift syntax check
        run: swiftc -parse ios/PincodeIndia.swift -sdk $(xcrun --show-sdk-path --sdk iphonesimulator) || true

  # ─── Publish: Only on version tags (v1.0.0, v1.2.3, etc.) ────────────────
  publish:
    name: Publish to npm
    needs: [test, android-verify, ios-verify]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
